<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | JNTU-GV</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1e293b;
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(251, 146, 60, 0.15);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            margin-bottom: 1.5rem;
            color: #f8fafc;
            font-size: 2rem;
        }

        .gradient-text {
            background: linear-gradient(135deg, #f472b6, #fb923c);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group svg {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            fill: #94a3b8;
        }

        .input-group input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 1px solid #334155;
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: #f472b6;
            box-shadow: 0 0 0 4px rgba(244, 114, 182, 0.15);
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            border: none;
            background: linear-gradient(135deg, #f472b6 0%, #fb923c 100%);
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(251, 146, 60, 0.3);
        }

        .error {
            color: #f87171;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .info-text {
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            color: #cbd5e1;
        }

        .link {
            color: #f472b6;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .link:hover {
            color: #fb923c;
        }

        .footer-text {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Forgot <span class="gradient-text">Password</span></h2>
        <p class="info-text">Enter your username, email, or mobile number to receive an OTP.</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/forgot_password">
            <div class="input-group">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                </svg>
                <input type="text" name="identifier" placeholder="Username, Email or Mobile" required>
            </div>
            <button type="submit" class="btn-primary">Send OTP</button>
        </form>
        <p class="footer-text">Remember your password? <a href="/login" class="link">Login here</a></p>
    </div>
</body>

</html>
