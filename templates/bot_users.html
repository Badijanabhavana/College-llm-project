<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Users | JNTU-GV</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary: #3B82F6;
            --primary-dark: #60A5FA;
            --sidebar-bg: linear-gradient(180deg, #0F172A 0%, #1E3A8A 100%);
            --sidebar-width: 260px;
            --bg-color: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            color: white;
            display: flex; flex-direction: column;
            box-shadow: 4px 0 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header {
            padding: 1.5rem; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-box { display: flex; align-items: center; gap: 12px; }
        .logo-icon { font-size: 1.8rem; }
        .logo-text { font-weight: 700; font-size: 1.25rem; }

        .sidebar-menu { padding: 1rem 0; flex-grow: 1; overflow-y: auto; }
        .menu-item {
            display: flex; align-items: center; padding: 0.8rem 1.5rem;
            color: rgba(255, 255, 255, 0.8); text-decoration: none;
            transition: var(--transition); gap: 15px;
        }
        .menu-item:hover { background: rgba(255, 255, 255, 0.1); color: white; padding-left: 2rem; }
        .menu-item.active { background: rgba(255, 255, 255, 0.15); color: white; border-left: 4px solid white; }
        .menu-icon { font-size: 1.4rem; min-width: 24px; text-align: center; }
        .menu-text { font-weight: 500; white-space: nowrap; }

        .main-container {
            margin-left: var(--sidebar-width);
            padding: 2rem 5%;
            width: calc(100% - var(--sidebar-width));
            min-height: 100vh;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-header {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #e2e8f0;
        }
        .page-title { font-size: 2rem; font-weight: 700; color: #1e3a8a; }

        .data-table {
            width: 100%; border-collapse: collapse; background: white;
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .data-table th {
            background: linear-gradient(135deg, #2563EB, #3B82F6);
            color: white; padding: 1rem; text-align: left; font-weight: 600;
        }
        .data-table td { padding: 1rem; border-bottom: 1px solid #e2e8f0; color: #334155; }
        .data-table tr:hover td { background: #f0f6ff; }
        .data-table tr:last-child td { border-bottom: none; }
        .badge {
            background: #dcfce7; color: #166534; padding: 0.2rem 0.6rem;
            border-radius: 20px; font-size: 0.8rem; font-weight: 600;
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-box">
                <span class="logo-icon">🤖</span>
                <span class="logo-text">Enquiry Bot</span>
            </div>
        </div>
        <nav class="sidebar-menu">
            <a href="/" class="menu-item"><span class="menu-icon">🏠</span><span class="menu-text">Home</span></a>
            <a href="/#chat" class="menu-item"><span class="menu-icon">🤖</span><span class="menu-text">Ask Bot</span></a>
            <a href="/feedback" class="menu-item"><span class="menu-icon">✍️</span><span class="menu-text">Give Feedback</span></a>
            <a href="/bot-users" class="menu-item active"><span class="menu-icon">👥</span><span class="menu-text">Bot Users</span></a>
            <a href="/unanswered" class="menu-item"><span class="menu-icon">❓</span><span class="menu-text">Unanswered Questions</span></a>
            <a href="/records" class="menu-item"><span class="menu-icon">📋</span><span class="menu-text">Feedback Record</span></a>
            <a href="/chat_history" class="menu-item"><span class="menu-icon">💬</span><span class="menu-text">Chat History</span></a>
            <a href="/logout" class="menu-item" style="margin-top: 2rem;"><span class="menu-icon">🚪</span><span class="menu-text">Logout</span></a>
        </nav>
    </aside>

    <main class="main-container">
        <div class="page-header">
            <h1 class="page-title">👥 Registered Bot Users</h1>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Manage and view all students currently registered to use the Enquiry System.</p>
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Email Address</th>
                    <th>Mobile Number</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="users-tbody">
                <tr>
                    <td colspan="4" style="text-align: center; color: #64748b; padding: 2rem;">Loading users...</td>
                </tr>
            </tbody>
        </table>
    </main>
    <script>
        async function fetchUsers() {
            try {
                const res = await fetch('/api/users');
                const users = await res.json();
                const tbody = document.getElementById('users-tbody');
                
                if(users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #64748b; padding: 2rem;">No users found in the system.</td></tr>';
                    return;
                }
                
                let html = '';
                users.forEach(user => {
                    html += `<tr>
                        <td style="font-weight: 600; color: #2563EB;">@${user.username}</td>
                        <td>${user.email || 'N/A'}</td>
                        <td>${user.mobile || 'N/A'}</td>
                        <td><span class="badge">Active</span></td>
                    </tr>`;
                });
                tbody.innerHTML = html;
            } catch (e) {
                console.error("Error fetching users:", e);
            }
        }
        
        // Fetch initially and poll every 5 seconds
        fetchUsers();
        setInterval(fetchUsers, 5000);
    </script>
</body>
</html>
