<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Give Feedback | JNTU-GV</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary: #3B82F6;
            --primary-dark: #60A5FA;
            --sidebar-bg: linear-gradient(180deg, #0F172A 0%, #1E3A8A 100%);
            --sidebar-width: 260px;
            --bg-color: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            color: white;
            display: flex; flex-direction: column;
            box-shadow: 4px 0 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header {
            padding: 1.5rem; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-box { display: flex; align-items: center; gap: 12px; }
        .logo-icon { font-size: 1.8rem; }
        .logo-text { font-weight: 700; font-size: 1.25rem; }

        .sidebar-menu { padding: 1rem 0; flex-grow: 1; overflow-y: auto; }
        .menu-item {
            display: flex; align-items: center; padding: 0.8rem 1.5rem;
            color: rgba(255, 255, 255, 0.8); text-decoration: none;
            transition: var(--transition); gap: 15px;
        }
        .menu-item:hover { background: rgba(255, 255, 255, 0.1); color: white; padding-left: 2rem; }
        .menu-item.active { background: rgba(255, 255, 255, 0.15); color: white; border-left: 4px solid white; }
        .menu-icon { font-size: 1.4rem; min-width: 24px; text-align: center; }
        .menu-text { font-weight: 500; white-space: nowrap; }

        .main-container {
            margin-left: var(--sidebar-width);
            padding: 2rem 5%;
            width: calc(100% - var(--sidebar-width));
            min-height: 100vh;
            animation: fadeIn 0.4s ease forwards;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback-form-card {
            background: white; border-radius: 16px;
            padding: 3rem 4rem; width: 100%; max-width: 700px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border-top: 6px solid #3B82F6;
        }

        .feedback-form-card h1 {
            color: #1e3a8a; font-size: 2.2rem; margin-bottom: 0.5rem;
        }
        
        .feedback-form-card p {
            color: #64748b; margin-bottom: 2rem; font-size: 1.05rem;
        }

        .form-group { margin-bottom: 1.5rem; }
        
        .form-group label {
            display: block; font-weight: 600; color: #334155; margin-bottom: 0.5rem; font-size: 0.95rem;
        }

        .form-group textarea {
            width: 100%; padding: 1.2rem; border: 2px solid #e2e8f0;
            border-radius: 12px; font-size: 1rem; color: #1e293b;
            resize: vertical; min-height: 150px;
            outline: none; transition: var(--transition);
        }

        .form-group textarea:focus {
            border-color: #3B82F6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-submit {
            background: linear-gradient(135deg, #2563EB, #3B82F6); color: white;
            border: none; padding: 1rem 2rem; border-radius: 50px; font-weight: 700;
            font-size: 1.05rem; cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; gap: 8px; justify-content: center;
            width: 100%;
        }

        .btn-submit:hover {
            transform: translateY(-2px); box-shadow: 0 10px 15px rgba(37, 99, 235, 0.3);
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-box">
                <span class="logo-icon">🤖</span>
                <span class="logo-text">Enquiry Bot</span>
            </div>
        </div>
        <nav class="sidebar-menu">
            <a href="/" class="menu-item"><span class="menu-icon">🏠</span><span class="menu-text">Home</span></a>
            <a href="/#chat" class="menu-item"><span class="menu-icon">🤖</span><span class="menu-text">Ask Bot</span></a>
            <a href="/feedback" class="menu-item active"><span class="menu-icon">✍️</span><span class="menu-text">Give Feedback</span></a>
            <a href="/bot-users" class="menu-item"><span class="menu-icon">👥</span><span class="menu-text">Bot Users</span></a>
            <a href="/unanswered" class="menu-item"><span class="menu-icon">❓</span><span class="menu-text">Unanswered Questions</span></a>
            <a href="/records" class="menu-item"><span class="menu-icon">📋</span><span class="menu-text">Feedback Record</span></a>
            <a href="/chat_history" class="menu-item"><span class="menu-icon">💬</span><span class="menu-text">Chat History</span></a>
            <a href="/logout" class="menu-item" style="margin-top: 2rem;"><span class="menu-icon">🚪</span><span class="menu-text">Logout</span></a>
        </nav>
    </aside>

    <main class="main-container">
        <div class="feedback-form-card">
            <h1>We Value Your Feedback ✍️</h1>
            <p>Help us improve the JNTU-GV Enquiry system. Did the bot answer all your questions accurately?</p>
            
            <form action="{{ url_for('feedback') }}" method="POST">
                <style>
                    .star-rating {
                        display: inline-flex;
                        flex-direction: row-reverse;
                    }
                    .star-rating input { display: none; }
                    .star-rating label {
                        font-size: 2rem;
                        color: #cbd5e1;
                        cursor: pointer;
                        transition: color 0.2s;
                        padding: 0 4px;
                    }
                    .star-rating label:hover,
                    .star-rating label:hover ~ label,
                    .star-rating input:checked ~ label {
                        color: #fbbf24;
                    }
                </style>
                <div class="form-group">
                    <label>How would you rate your experience?</label>
                    <div class="star-rating">
                        <input type="radio" id="star5" name="stars" value="5" checked />
                        <label for="star5" title="5 stars">★</label>
                        <input type="radio" id="star4" name="stars" value="4" />
                        <label for="star4" title="4 stars">★</label>
                        <input type="radio" id="star3" name="stars" value="3" />
                        <label for="star3" title="3 stars">★</label>
                        <input type="radio" id="star2" name="stars" value="2" />
                        <label for="star2" title="2 stars">★</label>
                        <input type="radio" id="star1" name="stars" value="1" />
                        <label for="star1" title="1 star">★</label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="message">Your Feedback / Suggestions</label>
                    <textarea name="message" id="message" placeholder="Type your experience or suggestion here..." required></textarea>
                </div>
                <button type="submit" class="btn-submit">
                    Submit Feedback
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
                </button>
            </form>
        </div>
    </main>
</body>
</html>
