<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | JNTU-GV</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 5rem auto;
            padding: 2rem;
            background: #1e293b;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #f8fafc;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .content {
            font-size: 1.1rem;
        }

        .btn-back {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.8rem 1.5rem;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
        }

        .btn-back:hover {
            background: #2563eb;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>{{ title }}</h1>
        <div class="content">
            {{ content|safe }}
        </div>
        <a href="/" class="btn-back">← Back to Dashboard</a>
    </div>
</body>

</html>
